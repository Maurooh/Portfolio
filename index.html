<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mauro Souza — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="Fotos/find-your-own-primary-180.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0d0d14;
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      -webkit-font-smoothing: antialiased;
    }

    .lang-wrapper {
      text-align: center;
      max-width: 600px;
      width: 100%;
    }

    .lang-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(16,185,129,0.12);
      border: 2px solid #10b981;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      font-weight: 700;
      color: #10b981;
      margin: 0 auto 1.5rem;
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(16,185,129,0.2); }
      50% { box-shadow: 0 0 0 14px rgba(16,185,129,0); }
    }

    .lang-name {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.4rem;
    }

    .lang-title {
      font-size: 0.95rem;
      color: #8888a8;
      margin-bottom: 3rem;
    }

    .lang-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #8888a8;
      margin-bottom: 1.25rem;
    }

    .lang-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .lang-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      padding: 2rem 1.5rem;
      background: #16162a;
      border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .lang-card:hover {
      border-color: #10b981;
      background: rgba(16,185,129,0.06);
      transform: translateY(-3px);
      box-shadow: 0 8px 32px rgba(16,185,129,0.15);
    }

    .lang-flag {
      width: 64px;
      height: 43px;
      object-fit: cover;
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .lang-card-name {
      font-size: 1rem;
      font-weight: 600;
    }

    .lang-card-sub {
      font-size: 0.8rem;
      color: #8888a8;
    }

    .lang-card-arrow {
      font-size: 0.8rem;
      color: #10b981;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .lang-card:hover .lang-card-arrow {
      opacity: 1;
    }

    @media (max-width: 420px) {
      .lang-cards { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="lang-wrapper">
    <div class="lang-avatar">MS</div>
    <h1 class="lang-name">Mauro Souza</h1>
    <p class="lang-title">Software Developer & Automation</p>

    <p class="lang-label">Escolha o idioma / Choose a language</p>

    <div class="lang-cards">
      <a href="pt.html" class="lang-card">
        <img class="lang-flag" src="https://flagcdn.com/w80/br.png" alt="Bandeira do Brasil" />
        <span class="lang-card-name">Português</span>
        <span class="lang-card-sub">Versão em Português</span>
        <span class="lang-card-arrow">Entrar →</span>
      </a>
      <a href="en.html" class="lang-card">
        <img class="lang-flag" src="https://flagcdn.com/w80/gb.png" alt="UK Flag" />
        <span class="lang-card-name">English</span>
        <span class="lang-card-sub">English Version</span>
        <span class="lang-card-arrow">Enter →</span>
      </a>
    </div>
  </div>
</body>
</html>
